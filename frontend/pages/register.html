<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />

    <title>Register — LimbahKu</title>

    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/navbar.css" />
    <link rel="stylesheet" href="/css/layout.css" />
    <link rel="stylesheet" href="/css/components.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital@1&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="auth-page">
      <div class="auth-container">
        <div class="auth-left">
          <div class="auth-logo">
            <img src="/frontend/assets/icons/icons.png" />

            <h1>LimbahKu</h1>
          </div>

          <p class="auth-tagline">
            Join the marketplace and start turning waste into worth.
          </p>
        </div>

        <div class="auth-right">
          <h2>Create Account</h2>

          <form>
            <input type="text" placeholder="Username" />

            <input type="email" placeholder="Email" />

            <input type="password" placeholder="Password" />

            <input type="password" placeholder="Confirm Password" />

            <button class="btn-primary">Register</button>

            <p class="auth-switch">
              Already have an account?

              <a href="/login">Login</a>
            </p>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
