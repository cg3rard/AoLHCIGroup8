<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LimbahKu — Waste Marketplace</title>
    <link rel="icon" type="image/png" href="/assets/icons/icons.png" />
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/navbar.css" />
    <link rel="stylesheet" href="/css/layout.css" />
    <link rel="stylesheet" href="/css/components.css" />
    <link rel="stylesheet" href="/css/marketplace.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital@1&display=swap"
      rel="stylesheet"
    />
  </head>

  <body class="marketplace-page">
    <div id="header"></div>

    <div class="search-container">
      <input type="text" class="search-box" placeholder="Cari produk limbah..." />
      <button class="wishlist-btn" title="Keranjang Wishlist">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
      </button>
    </div>

    <main class="marketplace">
      <div class="product-card">
        <img src="/assets/dummy/dummy.jpg" alt="Produk 1" />
        <div class="product-title">Botol Plastik Bekas</div>
        <div class="product-price">Rp 5.000</div>
      </div>

      <div class="product-card">
        <img src="/assets/dummy/dummy1.jpg" alt="Produk 2" />
        <div class="product-title">Kertas Bekas</div>
        <div class="product-price">Rp 3.000</div>
      </div>

      <div class="product-card">
        <img src="/assets/dummy/dummy2.jpg" alt="Produk 3" />
        <div class="product-title">Kaleng Alumunium</div>
        <div class="product-price">Rp 7.000</div>
      </div>

      <div class="product-card">
        <img src="/assets/dummy/dummy3.jpeg" alt="Produk 3" />
        <div class="product-title">Tutup Botol Plastik</div>
        <div class="product-price">Rp 2.000</div>
      </div>
    </main>

    <!-- Become Seller Section -->
    <section class="become-seller-section">
      <div class="become-seller-content">
        <h2>Ingin Menjadi Seller?</h2>
        <p>Jual produk limbah Anda dan temukan pembeli dengan mudah di LimbahKu</p>
        <a href="/seller" class="btn-seller">Daftar Sekarang</a>
      </div>
    </section>

    <div id="footer"></div>

    <script src="/js/loadComponents.js"></script>
  </body>
</html>
