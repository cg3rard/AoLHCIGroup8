<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />

    <title>Contact - LimbahKu</title>

    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/navbar.css" />
    <link rel="stylesheet" href="/css/layout.css" />
    <link rel="stylesheet" href="/css/components.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital@1&display=swap"
      rel="stylesheet"
    />

    <script src="https://unpkg.com/lucide@latest"></script>
  </head>

  <body>
    <div id="header"></div>

    <section class="contact-section">
      <div class="contact-container">
        <div class="contact-left">
          <div class="contact-brand">
            <i data-lucide="leaf"></i>

            <h2>LimbahKu</h2>
          </div>

          <p class="contact-text">
            We'd love to hear from you. Have questions, feedback, or ideas? Send
            us a message and we’ll get back to you soon.
          </p>

          <div class="contact-line"></div>
        </div>

        <div class="contact-form">
          <h3>Contact Us</h3>

          <input type="email" placeholder="Your Email" />

          <input type="text" placeholder="Subject" />

          <textarea placeholder="Write your message here..."></textarea>

          <button class="btn-primary">Send Message</button>
        </div>
      </div>
    </section>

    <div id="footer"></div>

    <script src="/js/loadComponents.js"></script>

    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
